<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Notebooks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .sidebar { height: 100vh; width: 250px; position: fixed; background: #212529; color: white; padding: 20px; }
        .main-content { margin-left: 260px; padding: 20px; }
        .notebook-card { border: none; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h3>Dashboard</h3>
        <hr>
        <p>Virtual Notebooks</p>
        <p>Tasks</p>
        <p>Profile</p>
        <a href="index.html" class="btn btn-danger btn-sm">Logout</a>
    </div>

    <div class="main-content">
        <h2 id="header-text">NOTEBOOKS</h2>
        <p>Select a subject to view your notes.</p>
        <hr>

        <div class="row" id="notebook-container">
            </div>

        <footer class="mt-5">
            <p>Source: <a href="https://www.w3schools.com" target="_blank">w3schools.com</a></p>
        </footer>
    </div>

    <script>
        // JavaScript Variables and Operators [cite: 20]
        const subjects = ["Filipino", "English", "Math", "Science", "Social Studies", "Values Ed"];
        let container = document.getElementById("notebook-container");

        // JavaScript Iteration (Loop) [cite: 23]
        for (let i = 0; i < subjects.length; i++) {
            // Using innerHTML to display content [cite: 26]
            container.innerHTML += `
                <div class="col-md-4 mb-4">
                    <div class="card notebook-card p-3">
                        <h5>${subjects[i]}</h5>
                        <p class="small text-muted">9-Amethyst 2025-2026</p>
                        <button class="btn btn-outline-primary btn-sm">Open Notebook</button>
                    </div>
                </div>
            `;
        }

        /* JavaScript Comment: This function runs on load */
        console.log("Dashboard Loaded"); // [cite: 21]
    </script>
</body>
</html>
